site_name: hermes recipes
site_description: working, tested Hermes Agent configs, walkthroughs, and threads from witcheer
site_url: https://notwitcheer.github.io/hermes-recipes/
repo_url: https://github.com/notwitcheer/hermes-recipes
repo_name: notwitcheer/hermes-recipes
edit_uri: ""

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: amber
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.top
    - navigation.sections
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - home: index.md
  - recipes:
      - 24/7 on a Mac Mini M4: recipes/mac-mini-24-7/README.md
      - on a cheap VPS: recipes/cheap-vps/README.md
      - lock it down: recipes/secure-hermes/README.md
      - your own agent on one GPU: recipes/sovereign-gpu/README.md
  - threads & cards: threads.md
  - changelog: changelog.md
